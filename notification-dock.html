<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>True Occupancy — Notification Dock</title>

<!-- Same font set as design-spec.html so the type-pairing toggle works here too. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/styles/tokens.css">
<link rel="stylesheet" href="src/styles/typography.css">
<link rel="stylesheet" href="src/styles/motion.css">
<link rel="stylesheet" href="src/styles/print.css">

<!-- Tailwind config mirrors app.html so utilities resolve identically. -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    safelist: [
      'bg-success', 'bg-success-soft', 'text-success', 'text-success-ink',
      'bg-warning', 'bg-warning-soft', 'text-warning', 'text-warning-ink',
      'bg-error',   'bg-error-soft',   'text-error',   'text-error-ink',
      'bg-verdict-high', 'bg-verdict-high-soft', 'text-verdict-high', 'text-verdict-high-ink',
      'bg-verdict-med',  'bg-verdict-med-soft',  'text-verdict-med',  'text-verdict-med-ink',
      'bg-verdict-low',  'bg-verdict-low-soft',  'text-verdict-low',  'text-verdict-low-ink',
      'text-display', 'text-h1', 'text-h2', 'text-h3', 'text-h4',
      'text-body', 'text-body-sm', 'text-label', 'text-caption', 'text-micro', 'text-eyebrow',
    ],
    theme: {
      extend: {
        colors: {
          bg: 'var(--bg)',
          surface: { DEFAULT: 'var(--surface)', 2: 'var(--surface-2)' },
          'pill-neutral': 'var(--pill-neutral-bg)',
          line:    { DEFAULT: 'var(--line)',    strong: 'var(--line-strong)' },
          'hover-bg': 'var(--hover-bg)',
          ink:     { DEFAULT: 'var(--ink)', 2: 'var(--ink-2)', 3: 'var(--ink-3)', 4: 'var(--ink-4)' },
          brand:   { DEFAULT: 'var(--brand)', 2: 'var(--brand-2)', soft: 'var(--brand-soft)', tint: 'var(--brand-tint)', deep: 'var(--brand-deep)' },
          clean:   { DEFAULT: 'var(--clean)', soft: 'var(--clean-soft)', ink: 'var(--clean-ink)' },
          warn:    { DEFAULT: 'var(--warn)',  soft: 'var(--warn-soft)',  ink: 'var(--warn-ink)' },
          risk:    { DEFAULT: 'var(--risk)',  soft: 'var(--risk-soft)',  ink: 'var(--risk-ink)' },
          verdict: {
            high: { DEFAULT: 'var(--verdict-high)', soft: 'var(--verdict-high-soft)', ink: 'var(--verdict-high-ink)' },
            med:  { DEFAULT: 'var(--verdict-med)',  soft: 'var(--verdict-med-soft)',  ink: 'var(--verdict-med-ink)' },
            low:  { DEFAULT: 'var(--verdict-low)',  soft: 'var(--verdict-low-soft)',  ink: 'var(--verdict-low-ink)' },
          },
          success: { DEFAULT: 'var(--success)', soft: 'var(--success-soft)', ink: 'var(--success-ink)' },
          warning: { DEFAULT: 'var(--warning)', soft: 'var(--warning-soft)', ink: 'var(--warning-ink)' },
          error:   { DEFAULT: 'var(--error)',   soft: 'var(--error-soft)',   ink: 'var(--error-ink)' },
          airbnb:  'var(--airbnb)',
          vrbo:    'var(--vrbo)',
          fb:      'var(--fb)',
        },
        borderRadius: { sm: 'var(--r-sm)', md: 'var(--r-md)', lg: 'var(--r-lg)', xl: 'var(--r-xl)' },
        boxShadow:    { sm: 'var(--shadow-sm)', md: 'var(--shadow-md)', lg: 'var(--shadow-lg)' },
        fontFamily:   { serif: 'var(--serif)', sans: 'var(--sans)', mono: 'var(--mono)' },
        fontSize: {
          display:   ['var(--text-display)', { lineHeight: '1.0' }],
          h1:        ['var(--text-h1)',      { lineHeight: '1.1' }],
          h2:        ['var(--text-h2)',      { lineHeight: '1.15' }],
          h3:        ['var(--text-h3)',      { lineHeight: '1.25' }],
          h4:        ['var(--text-h4)',      { lineHeight: '1.3' }],
          body:      ['var(--text-body)',    { lineHeight: '1.55' }],
          'body-sm': ['var(--text-body-sm)', { lineHeight: '1.5' }],
          label:     ['var(--text-label)',   { lineHeight: '1.4' }],
          caption:   ['var(--text-caption)', { lineHeight: '1.4' }],
          micro:     ['var(--text-micro)',   { lineHeight: '1.3' }],
          eyebrow:   ['var(--text-eyebrow)', { lineHeight: '1.2' }],
        },
      },
    },
  };
</script>

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: var(--ink); font-family: var(--sans); }
  #boot-status { position: fixed; left: 16px; bottom: 16px; font: 12px/1.4 ui-monospace, monospace; color: var(--ink-3); background: var(--surface); border: 1px solid var(--line); padding: 6px 10px; border-radius: 6px; box-shadow: var(--shadow-sm); z-index: 9999; }
  #boot-status.error { color: var(--error-ink); background: var(--error-soft); border-color: transparent; }

  /* Spec-canvas chrome — same primitives as states-spec.html. */
  .spec-canvas { padding: 80px 64px 120px; max-width: 1840px; margin: 0 auto; }

  .spec-header { max-width: 900px; margin-bottom: 60px; }
  .spec-header .eyebrow { font-family: var(--mono); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: .1em; color: var(--brand); margin-bottom: 14px; }
  .spec-header h1 { font-family: var(--serif); font-size: var(--text-display); font-weight: 600; line-height: 1; letter-spacing: -.02em; margin: 0 0 18px; }
  .spec-header h1 em { font-style: italic; color: var(--brand); }
  .spec-header p { font-size: var(--text-h4); color: var(--ink-2); line-height: 1.55; margin: 0; max-width: 60ch; }
  .spec-header code { font-family: var(--mono); font-size: var(--text-body-sm); background: var(--brand-soft); color: var(--brand-deep); padding: 1px 6px; border-radius: 4px; }

  .spec-section { margin-bottom: 80px; }
  .spec-section-head { display: flex; align-items: baseline; gap: 18px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .spec-section-head .num { font-family: var(--mono); font-size: var(--text-label); color: var(--ink-4); }
  .spec-section-head h2 { font-family: var(--serif); font-size: var(--text-h2); font-weight: 600; letter-spacing: -.01em; margin: 0; }
  .spec-section-head .desc { font-size: var(--text-body-sm); color: var(--ink-3); margin-left: auto; max-width: 42ch; line-height: 1.5; }
  .spec-row { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }

  .screen-wrap { display: flex; flex-direction: column; gap: 14px; }
  .screen-meta { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .screen-meta .label { font-family: var(--mono); font-size: var(--text-micro); text-transform: uppercase; letter-spacing: .08em; color: var(--brand); }
  .screen-meta h3 { font-family: var(--serif); font-size: var(--text-h3); font-weight: 600; margin: 0; }
  .screen-meta .desc { font-size: var(--text-label); color: var(--ink-3); width: 100%; line-height: 1.5; max-width: 80ch; }

  /* Notification-dock stages need overflow: visible so expanded / multi-task
     variants can poke out of the stage rather than getting clipped — the
     bug that drove this page's existence. The inline style on DockStage
     already sets it; this rule mirrors that for the !important specificity
     story so no future CSS edit silently re-clips. */
  .screen-frame {
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    background: var(--bg);
    overflow: visible !important;
    box-shadow: 0 24px 64px -32px rgba(28, 27, 23, .18), 0 4px 8px -2px rgba(28, 27, 23, .04);
  }

  .nav-anchor {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(250, 250, 247, .85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 80px;
    margin: -80px -64px 60px;
    display: flex;
    gap: 18px;
    font-family: var(--mono);
    font-size: var(--text-caption);
  }
  .nav-anchor a { color: var(--ink-3); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
  .nav-anchor a:hover { color: var(--brand); background: var(--brand-soft); }
  .nav-anchor .brand { font-family: var(--serif); font-size: var(--text-body); font-style: italic; color: var(--brand); margin-right: auto; }
</style>
</head>

<body data-type-pairing="halcyon">

<div id="root"></div>
<div id="boot-status">Loading…</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/react-router@5.3.4/umd/react-router.min.js" crossorigin></script>
<script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script>
/*
 * Bootstrap: same compile-and-inject pipeline as app.html / states-spec.html.
 * Trimmed load list — we only need what the NotificationDock and its primitives
 * touch. AppState is included because NotificationDock uses useAppState; the
 * stages wrap each frame in a MockAppStateProvider so the spec-gallery branch
 * runs without a live provider.
 */
(async () => {
  const status = document.getElementById('boot-status');
  const files = [
    // 1. Domain — needed by aiInvestigation, which exports useAIInvestigator
    //    and startAIInvestigation (NotificationDock declares them as globals).
    'src/data/scenarios.tsx',
    'src/data/aiInvestigation.tsx',
    // 2. Real AppState — the NotificationDock's live flavour calls
    //    useAppState(); even when notifications are forced via prop, the
    //    hook still resolves at render time.
    'src/state/AppState.tsx',
    // 3. Primitives the dock depends on.
    'src/components/ui/Icons.tsx',
    // 4. Notification stack — load order matters (Row → Stack → Pill → Dock).
    'src/components/notification/NotificationRow.tsx',
    'src/components/notification/NotificationStack.tsx',
    'src/components/notification/NotificationPill.tsx',
    'src/components/notification/NotificationDock.tsx',
    // 5. Spec canvas + mock provider + the new entry.
    'src/spec/SpecCanvas.tsx',
    'src/spec/MockAppStateProvider.tsx',
    'src/spec/NotificationDockSpecApp.tsx',
  ];

  const compileOpts = {
    presets: [
      ['typescript', { isTSX: true, allExtensions: true, allowDeclareFields: true, onlyRemoveTypeImports: true }],
      ['react', { runtime: 'classic' }],
    ],
  };

  function inject(code, filename) {
    const s = document.createElement('script');
    s.textContent = code + `\n//# sourceURL=${filename}`;
    document.head.appendChild(s);
  }

  const cacheBust =
    typeof window.__CACHE_BUST === 'string' ? window.__CACHE_BUST : `?v=${Date.now()}`;

  try {
    for (const path of files) {
      status.textContent = `Compiling ${path}…`;
      const src = await fetch(path + cacheBust).then((r) => {
        if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${path}`);
        return r.text();
      });
      const { code } = Babel.transform(src, { ...compileOpts, filename: path });
      inject(code, path);
    }
    status.textContent = 'Mounting…';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(NotificationDockSpecApp));
    status.remove();
  } catch (err) {
    status.className = 'error';
    status.textContent = 'Boot error — see console';
    console.error('[notification-dock.html] boot failed:', err);
  }
})();
</script>

</body>
</html>
