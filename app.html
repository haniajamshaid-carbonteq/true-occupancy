<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<title>True Occupancy</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- CSS loaded via inline script with per-load cache-bust so edits to
     tokens / typography / motion show up on refresh without a hard reload.
     Mirrors the .tsx cache-bust pattern in the bootstrap loader below. -->
<script>
  (function () {
    var v = Date.now();
    ['src/styles/tokens.css', 'src/styles/typography.css', 'src/styles/motion.css', 'src/styles/print.css'].forEach(function (href) {
      var link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = href + '?v=' + v;
      document.head.appendChild(link);
    });
  })();
</script>

<!-- Tailwind Play CDN — config mirrors tailwind.config.js so utilities resolve to our tokens -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    // The Play CDN's JIT only generates utilities for classes it sees in
    // the live DOM. Conditionally-rendered classes (e.g. `bg-error-soft`
    // on a destructive menu item that isn't currently mounted) would be
    // skipped. Explicit safelist for the state-token utilities we want
    // available everywhere — kept as a flat string list so the CDN
    // doesn't have to expand a regex × variant matrix on boot.
    safelist: [
      'bg-success', 'bg-success-soft', 'text-success', 'text-success-ink', 'border-success', 'border-success-soft',
      'bg-warning', 'bg-warning-soft', 'text-warning', 'text-warning-ink', 'border-warning', 'border-warning-soft',
      'bg-error',   'bg-error-soft',   'text-error',   'text-error-ink',   'border-error',   'border-error-soft',
      'hover:bg-success-soft', 'hover:text-success-ink',
      'hover:bg-warning-soft', 'hover:text-warning-ink',
      'hover:bg-error-soft',   'hover:text-error-ink',
      'active:bg-success-soft', 'active:bg-warning-soft', 'active:bg-error-soft',
      // Verdict tones (purple / yellow / blue) — neutral categorical fills
      // for "Rented / Possibly rented / Not rented" pills + the matching
      // header dot on BatchScreen MetricCards.
      'bg-verdict-high',      'bg-verdict-high-soft',     'text-verdict-high',     'text-verdict-high-ink',
      'bg-verdict-med',       'bg-verdict-med-soft',      'text-verdict-med',      'text-verdict-med-ink',
      'bg-verdict-low',       'bg-verdict-low-soft',      'text-verdict-low',      'text-verdict-low-ink',
      // Type ramp — safelist all 11 size utilities so they're available
      // even before any code in the bundle uses them.
      'text-display', 'text-h1', 'text-h2', 'text-h3', 'text-h4',
      'text-body', 'text-body-sm', 'text-label', 'text-caption', 'text-micro', 'text-eyebrow',
    ],
    theme: {
      extend: {
        colors: {
          bg: 'var(--bg)',
          surface: { DEFAULT: 'var(--surface)', 2: 'var(--surface-2)' },
          'pill-neutral': 'var(--pill-neutral-bg)',
          line:    { DEFAULT: 'var(--line)',    strong: 'var(--line-strong)' },
          'hover-bg': 'var(--hover-bg)',
          ink:     { DEFAULT: 'var(--ink)', 2: 'var(--ink-2)', 3: 'var(--ink-3)', 4: 'var(--ink-4)' },
          brand:   { DEFAULT: 'var(--brand)', 2: 'var(--brand-2)', soft: 'var(--brand-soft)', tint: 'var(--brand-tint)', deep: 'var(--brand-deep)' },
          clean:   { DEFAULT: 'var(--clean)', soft: 'var(--clean-soft)', ink: 'var(--clean-ink)' },
          warn:    { DEFAULT: 'var(--warn)',  soft: 'var(--warn-soft)',  ink: 'var(--warn-ink)' },
          risk:    { DEFAULT: 'var(--risk)',  soft: 'var(--risk-soft)',  ink: 'var(--risk-ink)' },
          verdict: {
            high: { DEFAULT: 'var(--verdict-high)', soft: 'var(--verdict-high-soft)', ink: 'var(--verdict-high-ink)' },
            med:  { DEFAULT: 'var(--verdict-med)',  soft: 'var(--verdict-med-soft)',  ink: 'var(--verdict-med-ink)' },
            low:  { DEFAULT: 'var(--verdict-low)',  soft: 'var(--verdict-low-soft)',  ink: 'var(--verdict-low-ink)' },
          },
          success: { DEFAULT: 'var(--success)', soft: 'var(--success-soft)', ink: 'var(--success-ink)' },
          warning: { DEFAULT: 'var(--warning)', soft: 'var(--warning-soft)', ink: 'var(--warning-ink)' },
          error:   { DEFAULT: 'var(--error)',   soft: 'var(--error-soft)',   ink: 'var(--error-ink)' },
          airbnb:  'var(--airbnb)',
          vrbo:    'var(--vrbo)',
          fb:      'var(--fb)',
        },
        borderRadius: { sm: 'var(--r-sm)', md: 'var(--r-md)', lg: 'var(--r-lg)', xl: 'var(--r-xl)' },
        boxShadow:    { sm: 'var(--shadow-sm)', md: 'var(--shadow-md)', lg: 'var(--shadow-lg)' },
        fontFamily:   { serif: 'var(--serif)', sans: 'var(--sans)', mono: 'var(--mono)' },
        // Type ramp — semantic names map to --text-* CSS vars in tokens.css.
        // Use `text-h1`, `text-body-sm`, `text-eyebrow` etc. instead of
        // raw `text-[14px]` so we have a single source of truth.
        fontSize: {
          display:   ['var(--text-display)', { lineHeight: '1.0' }],
          h1:        ['var(--text-h1)',      { lineHeight: '1.1' }],
          h2:        ['var(--text-h2)',      { lineHeight: '1.15' }],
          h3:        ['var(--text-h3)',      { lineHeight: '1.25' }],
          h4:        ['var(--text-h4)',      { lineHeight: '1.3' }],
          body:      ['var(--text-body)',    { lineHeight: '1.55' }],
          'body-sm': ['var(--text-body-sm)', { lineHeight: '1.5' }],
          label:     ['var(--text-label)',   { lineHeight: '1.4' }],
          caption:   ['var(--text-caption)', { lineHeight: '1.4' }],
          micro:     ['var(--text-micro)',   { lineHeight: '1.3' }],
          eyebrow:   ['var(--text-eyebrow)', { lineHeight: '1.2' }],
        },
      },
    },
  };
</script>

<style>
  html, body { margin: 0; padding: 0; background: #F4F6F8; color-scheme: light; }
  body { font-family: var(--sans, "Century Gothic", "URW Geometric", "Avenir Next", system-ui, sans-serif); color: var(--ink, #1C1C1E); background: var(--bg, #F4F6F8); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }
  #boot-status { position: fixed; left: 16px; bottom: 16px; font: 12px/1.4 ui-monospace, monospace; color: var(--ink-3); background: var(--surface); border: 1px solid var(--line); padding: 6px 10px; border-radius: 6px; box-shadow: var(--shadow-sm); z-index: 9999; }
  #boot-status.error { color: var(--error-ink); background: var(--error-soft); border-color: transparent; }
</style>
</head>

<body data-type-pairing="halcyon">

<div id="root"></div>
<div id="boot-status">Loading…</div>

<!-- React 18 + React Router v5 (UMD) + Babel Standalone -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/react-router@5.3.4/umd/react-router.min.js" crossorigin></script>
<script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script>
/*
 * Bootstrap: fetch each .tsx, compile with explicit TS+React preset
 * options (isTSX + allExtensions), and inject the result as a plain
 * <script> so top-level function declarations land in shared global
 * script scope. This matches the existing *.jsx pattern in the repo.
 *
 * Load order matters: data → primitives → compositions → pages → router.
 */
(async () => {
  const status = document.getElementById('boot-status');
  const files = [
    // 1. Domain
    'src/data/scenarios.tsx',
    // 2. Primitives
    'src/state/AppState.tsx',
    'src/components/ui/Icons.tsx',
    'src/components/ui/Button.tsx',
    'src/components/ui/Pill.tsx',
    'src/components/ui/Card.tsx',
    'src/components/ui/Modal.tsx',
    'src/components/ui/Drawer.tsx',
    'src/components/ui/ChipRow.tsx',
    'src/components/ui/Tabs.tsx',
    'src/components/ui/Input.tsx',
    'src/components/ui/Checkbox.tsx',
    'src/components/ui/RiskBadge.tsx',
    'src/components/ui/SearchBar.tsx',
    'src/components/ui/CommandSearch.tsx',
    'src/components/ui/CommandPalette.tsx',
    'src/components/ui/Avatar.tsx',
    'src/components/ui/Tag.tsx',
    'src/components/ui/Keycap.tsx',
    'src/components/ui/DataTable.tsx',
    'src/components/ui/MetricCard.tsx',
    'src/components/ui/DropdownMenu.tsx',
    'src/components/ui/BatchHugCard.tsx',
    // 3. Structural
    'src/components/SideNav.tsx',
    'src/components/AppShell.tsx',
    'src/components/PageHeader.tsx',
    'src/components/ScanContextBar.tsx',
    'src/components/AutomateModal.tsx',
    'src/components/AutomationControl.tsx',
    'src/components/VerdictTiles.tsx',
    // 4. Scan
    'src/components/scan/ScanCard.tsx',
    'src/components/scan/ScanStage.tsx',
    // 5. Result
    'src/components/result/ConfidenceHero.tsx',
    'src/components/result/PropertyMap.tsx',
    'src/components/result/PropertySpecs.tsx',
    'src/components/result/PropertyOverview.tsx',
    'src/components/result/ListingsPanel.tsx',
    'src/components/result/ReportCertificateBar.tsx',
    'src/components/result/CertificateSheet.tsx',
    // 6. Pages
    'src/pages/Components.tsx',
    'src/pages/HomeScreen.tsx',
    'src/pages/HistoryScreen.tsx',
    'src/pages/ScheduledScreen.tsx',
    'src/pages/BatchScreen.tsx',
    'src/pages/BatchDetailScreen.tsx',
    'src/pages/ScanStartScreen.tsx',
    'src/pages/ScanMidScreen.tsx',
    'src/pages/ResultCleanScreen.tsx',
    'src/pages/ResultMediumScreen.tsx',
    'src/pages/ResultHighScreen.tsx',
    'src/pages/WhyExpandedScreen.tsx',
    'src/pages/AuthScreen.tsx',
    // 7. Router
    'src/App.tsx',
  ];

  const compileOpts = {
    presets: [
      ['typescript', { isTSX: true, allExtensions: true, allowDeclareFields: true, onlyRemoveTypeImports: true }],
      ['react', { runtime: 'classic' }],
    ],
  };

  function inject(code, filename) {
    const s = document.createElement('script');
    s.textContent = code + `\n//# sourceURL=${filename}`;
    document.head.appendChild(s);
  }

  // Cache-bust .tsx fetches with a per-page-load token so refreshes always
  // pick up freshly edited source files. Set `window.__CACHE_BUST = ''` in
  // the console to disable while debugging.
  const cacheBust =
    typeof window.__CACHE_BUST === 'string' ? window.__CACHE_BUST : `?v=${Date.now()}`;

  try {
    for (const path of files) {
      status.textContent = `Compiling ${path}…`;
      const src = await fetch(path + cacheBust).then((r) => {
        if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${path}`);
        return r.text();
      });
      const { code } = Babel.transform(src, { ...compileOpts, filename: path });
      inject(code, path);
    }
    status.textContent = 'Mounting…';
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    status.remove();
  } catch (err) {
    status.className = 'error';
    status.textContent = 'Boot error — see console';
    console.error('[app.html] boot failed:', err);
  }
})();
</script>

</body>
</html>
