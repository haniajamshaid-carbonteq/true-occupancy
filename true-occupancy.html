<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>True Occupancy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* Neutrals — warm, paper-like */
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --surface-2: #FBF9F4;
    --line: #E8E3D8;
    --line-strong: #D6CFBF;
    --ink: #1C1B17;
    --ink-2: #45433C;
    --ink-3: #76736A;
    --ink-4: #A19D91;

    /* Brand — deep forest, the "investigative" anchor */
    --brand: #1F3D2E;
    --brand-2: #2E5742;
    --brand-soft: #E7EFE7;
    --brand-tint: #F1F5EE;

    /* Risk semantics — earthy, not screaming */
    --clean: #5B8A6A;
    --clean-soft: #E8F0E5;
    --clean-ink: #2C4A36;

    --warn: #C68A3C;
    --warn-soft: #FBF0DB;
    --warn-ink: #6B4914;

    --risk: #C0533C;
    --risk-soft: #FBE3DB;
    --risk-ink: #6F2917;

    /* Platform brand colors (used sparingly as accents) */
    --airbnb: #FF5A5F;
    --vrbo: #245ABE;
    --fb: #1877F2;

    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 18px;
    --r-xl: 28px;

    --shadow-sm: 0 1px 2px rgba(28,27,23,.04), 0 1px 1px rgba(28,27,23,.03);
    --shadow-md: 0 4px 14px -4px rgba(28,27,23,.08), 0 2px 4px rgba(28,27,23,.04);
    --shadow-lg: 0 24px 48px -16px rgba(28,27,23,.12), 0 8px 16px -8px rgba(28,27,23,.06);

    --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --sans: "Geist", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    letter-spacing: -0.005em;
    overflow-x: hidden;
  }

  ::selection { background: var(--brand); color: #fff; }

  /* ---------- App shell ---------- */
  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 248px 1fr;
  }

  .sidebar {
    background: var(--surface-2);
    border-right: 1px solid var(--line);
    padding: 28px 22px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .logo .mark {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--brand);
    display: grid; place-items: center;
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.12), 0 1px 2px rgba(0,0,0,.15);
  }
  .logo em { font-style: italic; color: var(--brand); }

  .nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .nav-section {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    padding: 12px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-sm);
    color: var(--ink-2);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s;
  }
  .nav-item:hover { background: rgba(28,27,23,.04); }
  .nav-item.active { background: var(--brand-tint); color: var(--brand); }
  .nav-item .badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
  }
  .nav-item svg { width: 16px; height: 16px; opacity: .8; }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C9B89E, #8C7A5B);
    color: #fff;
    display: grid; place-items: center;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .avatar-meta { line-height: 1.2; }
  .avatar-meta .name { font-size: 13px; font-weight: 500; }
  .avatar-meta .role { font-size: 11.5px; color: var(--ink-3); }

  /* ---------- Main ---------- */
  .main {
    padding: 32px 48px 80px;
    max-width: 1280px;
    width: 100%;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink-3);
    font-family: var(--mono);
  }
  .breadcrumb .sep { opacity: .4; }
  .breadcrumb .current { color: var(--ink-2); }
  .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .menu-btn {
    display: none;
    align-items: center;
    justify-content: center;
    width: 40px; height: 40px;
    border-radius: var(--r-sm);
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink-2);
    cursor: pointer;
    flex-shrink: 0;
  }
  .menu-btn:hover { color: var(--ink); border-color: var(--ink-3); }

  .sidebar-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-close {
    display: none;
    width: 32px; height: 32px;
    align-items: center;
    justify-content: center;
    border-radius: var(--r-sm);
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-3);
    cursor: pointer;
  }
  .sidebar-close:hover { background: rgba(28,27,23,.06); color: var(--ink); }

  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,27,23,.4);
    z-index: 99;
    opacity: 0;
    transition: opacity .2s ease;
  }
  .sidebar-backdrop.open { opacity: 1; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 36px;
    padding: 0 14px;
    border-radius: var(--r-sm);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--line-strong);
    background: var(--surface);
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { border-color: var(--ink-3); color: var(--ink); }
  .btn.primary {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
    box-shadow: var(--shadow-sm);
  }
  .btn.primary:hover { background: var(--brand-2); border-color: var(--brand-2); }
  .btn.ghost { border-color: transparent; background: transparent; }
  .btn.ghost:hover { background: rgba(28,27,23,.05); }
  .btn svg { width: 14px; height: 14px; }

  /* ---------- Page header ---------- */
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 24px;
    gap: 24px;
  }
  .page-title {
    font-family: var(--serif);
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .page-title em { font-style: italic; color: var(--brand); }
  .page-sub {
    font-size: 14.5px;
    color: var(--ink-3);
    max-width: 56ch;
    margin: 0;
    line-height: 1.5;
  }

  /* ---------- Search bar ---------- */
  .search-wrap {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow-sm);
    transition: border-color .15s, box-shadow .15s;
  }
  .search-wrap:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 4px rgba(31,61,46,.08), var(--shadow-sm);
  }
  .search-wrap .icon {
    width: 36px;
    display: grid; place-items: center;
    color: var(--ink-3);
  }
  .search-wrap input {
    flex: 1;
    border: 0;
    outline: 0;
    background: transparent;
    font-family: var(--sans);
    font-size: 16px;
    color: var(--ink);
    padding: 8px 0;
    letter-spacing: -0.01em;
  }
  .search-wrap input::placeholder { color: var(--ink-4); }

  /* ---------- Cards / shared ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-sm);
  }
  .card-pad { padding: 24px 28px; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 24px;
    padding: 0 10px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--surface-2);
    color: var(--ink-2);
    border: 1px solid var(--line);
  }
  .pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }

  .pill.clean { background: var(--clean-soft); color: var(--clean-ink); border-color: transparent; }
  .pill.warn  { background: var(--warn-soft);  color: var(--warn-ink);  border-color: transparent; }
  .pill.risk  { background: var(--risk-soft);  color: var(--risk-ink);  border-color: transparent; }
  .pill.brand { background: var(--brand-soft); color: var(--brand);     border-color: transparent; }

  /* ---------- Layout grid ---------- */
  .results-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  /* ---------- Hero score card ---------- */
  .score-card {
    display: grid;
    grid-template-columns: 380px 1fr;
    overflow: hidden;
    position: relative;
  }
  .score-hero {
    padding: 36px 36px 36px;
    border-right: 1px solid var(--line);
    position: relative;
    background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  }
  .score-hero.r-clean { background: linear-gradient(180deg, var(--clean-soft) 0%, var(--surface) 80%); }
  .score-hero.r-warn  { background: linear-gradient(180deg, var(--warn-soft) 0%, var(--surface) 80%); }
  .score-hero.r-risk  { background: linear-gradient(180deg, var(--risk-soft) 0%, var(--surface) 80%); }

  .score-label {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-bottom: 12px;
  }
  .score-num {
    font-family: var(--serif);
    font-size: clamp(72px, 14vw, 128px);
    font-weight: 400;
    line-height: 0.9;
    color: var(--ink);
    letter-spacing: -0.04em;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .score-num .denom {
    font-size: 28px;
    color: var(--ink-4);
    letter-spacing: -0.02em;
  }
  .score-risk-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 8px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
  }
  .risk-badge .glyph {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: #fff;
  }
  .risk-badge.clean { background: var(--clean-soft); color: var(--clean-ink); }
  .risk-badge.clean .glyph { background: var(--clean); }
  .risk-badge.warn  { background: var(--warn-soft);  color: var(--warn-ink); }
  .risk-badge.warn  .glyph { background: var(--warn); }
  .risk-badge.risk  { background: var(--risk-soft);  color: var(--risk-ink); }
  .risk-badge.risk  .glyph { background: var(--risk); }

  .score-summary {
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .score-summary h3 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    margin: 0;
    line-height: 1.25;
    letter-spacing: -0.01em;
  }
  .score-summary p {
    margin: 0;
    color: var(--ink-2);
    font-size: 14.5px;
    line-height: 1.55;
  }
  .property-meta {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .property-meta .cell .k {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    margin-bottom: 4px;
  }
  .property-meta .cell .v {
    font-size: 13.5px;
    color: var(--ink);
    font-weight: 500;
  }

  /* ---------- Why this score ---------- */
  .why-card { padding: 0; overflow: hidden; }
  .why-head {
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .why-head:hover { background: var(--surface-2); }
  .why-head .left { display: flex; align-items: center; gap: 14px; }
  .why-head h3 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 400;
    margin: 0;
    letter-spacing: -0.005em;
  }
  .why-head .count {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .chev {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--surface-2);
    display: grid; place-items: center;
    color: var(--ink-2);
    transition: transform .25s ease;
  }
  .why-card.open .chev { transform: rotate(180deg); }
  .why-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .35s ease;
  }
  .why-card.open .why-body { grid-template-rows: 1fr; }
  .why-body > div { overflow: hidden; }
  .why-inner {
    padding: 4px 28px 28px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
  }
  .factor-col h4 {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin: 0 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .factor-col h4 .swatch { width: 8px; height: 8px; border-radius: 2px; }
  .factor-col.neg h4 .swatch { background: var(--risk); }
  .factor-col.pos h4 .swatch { background: var(--clean); }

  .factor {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 12px;
    padding: 14px 0;
    border-top: 1px dashed var(--line);
    align-items: flex-start;
  }
  .factor:first-of-type { border-top: 0; padding-top: 4px; }
  .factor .ico {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .factor.pos .ico { background: var(--clean-soft); color: var(--clean); }
  .factor.neg .ico { background: var(--risk-soft);  color: var(--risk); }
  .factor .body .t {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.35;
    margin-bottom: 3px;
  }
  .factor .body .d {
    font-size: 13px;
    color: var(--ink-3);
    line-height: 1.45;
  }
  .factor .weight {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    background: var(--surface-2);
    border: 1px solid var(--line);
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .factor.pos .weight { color: var(--clean-ink); background: var(--clean-soft); border-color: transparent; }
  .factor.neg .weight { color: var(--risk-ink);  background: var(--risk-soft);  border-color: transparent; }

  /* ---------- Live scan log ---------- */
  .scan-card { padding: 0; overflow: hidden; }
  .scan-head {
    padding: 20px 28px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }
  .scan-head h3 {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .scan-head .meta {
    display: flex;
    align-items: center;
    gap: 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-3);
  }
  .scan-head .meta .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--clean);
    box-shadow: 0 0 0 0 rgba(91,138,106,.5);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(91,138,106,.5); }
    70% { box-shadow: 0 0 0 8px rgba(91,138,106,0); }
    100% { box-shadow: 0 0 0 0 rgba(91,138,106,0); }
  }

  .scan-body {
    padding: 18px 28px 28px;
    background: var(--surface-2);
  }
  .timeline {
    position: relative;
    padding-left: 16px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 7px; top: 6px; bottom: 6px;
    width: 1px;
    background: linear-gradient(to bottom, var(--line) 0%, var(--line) 50%, transparent 100%);
  }
  .log-line {
    position: relative;
    padding: 6px 0 6px 18px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-2);
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 12px;
    align-items: center;
    opacity: 0;
    transform: translateY(-4px);
    animation: enter .35s ease forwards;
  }
  @keyframes enter {
    to { opacity: 1; transform: translateY(0); }
  }
  .log-line .ts { color: var(--ink-4); font-size: 11.5px; }
  .log-line .msg { color: var(--ink-2); }
  .log-line .msg .tag {
    color: var(--ink-4);
    margin-right: 4px;
  }
  .log-line.ok .msg .tag { color: var(--clean); }
  .log-line.warn .msg .tag { color: var(--warn); }
  .log-line.err .msg .tag { color: var(--risk); }
  .log-line.info .msg .tag { color: var(--brand-2); }

  .log-line::before {
    content: "";
    position: absolute;
    left: -2px;
    top: 50%;
    transform: translateY(-50%);
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--surface);
    border: 1.5px solid var(--line-strong);
  }
  .log-line.ok::before   { background: var(--clean); border-color: var(--clean); }
  .log-line.warn::before { background: var(--warn);  border-color: var(--warn); }
  .log-line.err::before  { background: var(--risk);  border-color: var(--risk); }
  .log-line.info::before { background: var(--brand); border-color: var(--brand); }
  .log-line.spin::before {
    background: var(--surface);
    border: 1.5px solid var(--brand);
    border-top-color: transparent;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  .log-line .latency {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
  }

  /* ---------- Platform cards (during + after scan) ---------- */
  .platforms {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    padding: 24px 28px;
    border-top: 1px solid var(--line);
    background: var(--surface);
  }
  .pf-card {
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 16px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color .25s, box-shadow .25s;
  }
  .pf-card.checking { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(31,61,46,.08); }
  .pf-head {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pf-logo {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: grid; place-items: center;
    color: #fff;
    font-weight: 700;
    font-family: var(--sans);
    font-size: 14px;
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .pf-logo.airbnb { background: var(--airbnb); }
  .pf-logo.vrbo   { background: var(--vrbo); }
  .pf-logo.fb     { background: var(--fb); }

  .pf-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.1;
  }
  .pf-domain {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-4);
  }
  .pf-status {
    margin-left: auto;
  }

  .pf-status.checking { color: var(--brand); }
  .pf-status.ok       { color: var(--clean); }
  .pf-status.empty    { color: var(--ink-3); }
  .pf-status.err      { color: var(--risk); }

  .pf-result {
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.45;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 60px;
  }
  .pf-result .none {
    color: var(--ink-3);
    font-style: italic;
  }
  .pf-result .skel-row {
    display: flex; gap: 6px;
  }
  .skel {
    background: linear-gradient(90deg, var(--line) 0%, var(--surface-2) 50%, var(--line) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s linear infinite;
    border-radius: 4px;
    height: 10px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .skel.w50 { width: 50%; }
  .skel.w70 { width: 70%; }
  .skel.w30 { width: 30%; }

  /* Listings */
  .listing {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 12px;
    padding: 12px;
    border-radius: 10px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    transition: background .15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .listing:hover { background: var(--bg); }
  .listing .thumb {
    width: 56px; height: 56px;
    border-radius: 8px;
    background: linear-gradient(135deg, #d8d4c8, #a8a394);
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .listing .thumb::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,.05), rgba(0,0,0,.15));
  }
  .listing .body { min-width: 0; }
  .listing .title {
    font-size: 13.5px;
    font-weight: 500;
    line-height: 1.3;
    color: var(--ink);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .listing .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
  }
  .listing .meta-row .sep { opacity: .4; }
  .listing .match {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }
  .match-pill {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 500;
  }
  .match-pill.high { background: var(--risk-soft); color: var(--risk-ink); }
  .match-pill.med  { background: var(--warn-soft); color: var(--warn-ink); }
  .match-pill.low  { background: var(--surface-2); color: var(--ink-3); border: 1px solid var(--line); }
  .listing .ext {
    color: var(--ink-4);
    font-size: 11px;
  }
  .listing .ext svg { width: 11px; height: 11px; vertical-align: -1px; margin-left: 3px; }

  /* ---------- Live scan checklist ---------- */
  .scan-checklist {
    padding: 12px 16px 16px;
    background: var(--surface-2);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .scan-step {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 14px 12px;
    border-radius: var(--r-md);
    background: transparent;
    transition: background .25s, opacity .25s;
  }
  .scan-step.status-pending { opacity: .5; }
  .scan-step.status-running { background: var(--surface); box-shadow: var(--shadow-sm); }
  .scan-step.status-done { background: transparent; }

  .scan-step-icon {
    width: 32px; height: 32px;
    display: grid; place-items: center;
  }
  .cs-pending {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 1.5px dashed var(--line-strong);
  }
  .cs-spin {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 1.8px solid var(--brand);
    border-top-color: transparent;
    animation: spin .8s linear infinite;
  }
  .cs-icon {
    width: 24px; height: 24px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: #fff;
  }
  .cs-icon.cs-ok   { background: var(--clean); }
  .cs-icon.cs-warn { background: var(--warn); }

  .scan-step-label {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .scan-step-sub {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-3);
    line-height: 1.35;
  }
  .scan-step.status-running .scan-step-label { color: var(--brand); }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 36px 0 14px;
  }
  .section-head h2 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .section-head .sub {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ---------- Listings groups (collapsed view) ---------- */
  .platform-section {
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--surface);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .platform-section + .platform-section { margin-top: 14px; }
  .ps-head {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
  }
  .ps-head:hover { background: var(--surface-2); }
  .ps-head .name { font-size: 15px; font-weight: 600; }
  .ps-head .count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-3);
  }
  .ps-head .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .ps-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .3s ease;
  }
  .platform-section.open .ps-body { grid-template-rows: 1fr; }
  .ps-body > div { overflow: hidden; }
  .ps-inner {
    padding: 0 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .platform-section .chev { background: transparent; }
  .platform-section.open .chev { transform: rotate(180deg); }

  .empty-state {
    padding: 18px;
    border: 1px dashed var(--line);
    border-radius: 10px;
    background: var(--surface-2);
    text-align: center;
    color: var(--ink-3);
    font-size: 13px;
  }
  .empty-state strong { color: var(--ink-2); font-weight: 600; }

  /* ---------- State chip menu (top-right of main) ---------- */
  .state-chips {
    display: inline-flex;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    gap: 2px;
    box-shadow: var(--shadow-sm);
  }
  .state-chips button {
    border: 0;
    background: transparent;
    padding: 6px 12px;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink-3);
    cursor: pointer;
    transition: all .15s;
  }
  .state-chips button:hover { color: var(--ink); }
  .state-chips button.active {
    background: var(--brand);
    color: #fff;
  }

  /* ---------- Replay button ---------- */
  .replay-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s;
  }
  .replay-btn:hover { border-color: var(--brand); color: var(--brand); }
  .replay-btn svg { width: 12px; height: 12px; }

  /* ---------- Tag list (next to address) ---------- */
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 14px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 26px;
    padding: 0 10px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-2);
  }
  .tag svg { width: 12px; height: 12px; opacity: .7; }

  /* ---------- Step indicator (during scan) ---------- */
  .scan-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
  }
  .scan-progress .bar {
    flex: 1;
    height: 4px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .scan-progress .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--brand), var(--brand-2));
    border-radius: 999px;
    transition: width .4s ease;
  }
  .scan-progress .pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-3);
    width: 40px;
    text-align: right;
  }

  /* ---------- Confidence bar (mini) ---------- */
  .signal-bar {
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    margin-top: 6px;
    overflow: hidden;
  }
  .signal-bar > div {
    height: 100%;
    border-radius: 999px;
    background: var(--ink-2);
    transition: width .5s ease;
  }
  .factor.pos .signal-bar > div { background: var(--clean); }
  .factor.neg .signal-bar > div { background: var(--risk); }

  /* ---------- Two-column layout for results ---------- */
  .res-2col {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    margin-top: 18px;
  }

  /* responsive */
  @media (max-width: 1100px) {
    .score-card { grid-template-columns: 1fr; }
    .score-hero { border-right: 0; border-bottom: 1px solid var(--line); }
    .why-inner { grid-template-columns: 1fr; gap: 24px; }
    .platforms { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .app {
      grid-template-columns: 1fr;
    }
    .menu-btn { display: inline-flex; }
    .sidebar-close { display: inline-flex; }
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 280px;
      max-width: 85vw;
      height: 100vh;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform .25s ease;
      box-shadow: 0 24px 48px -16px rgba(28,27,23,.18);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-backdrop.open { display: block; }

    .main {
      padding: 20px 20px 64px;
    }
    .topbar { gap: 12px; flex-wrap: wrap; }
    .breadcrumb { font-size: 12px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-actions { width: 100%; }
    .state-chips { order: -1; }

    .page-head {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .page-head > div:last-child {
      text-align: left !important;
    }

    .search-wrap { flex-wrap: wrap; padding: 6px; }
    .search-wrap .icon { width: 32px; }
    .search-wrap input { font-size: 15px; min-width: 0; flex: 1 1 100%; padding: 6px 4px; }
    .search-wrap .btn { flex: 1; justify-content: center; }

    .card-pad { padding: 20px; }
    .score-hero { padding: 24px; }
    .score-summary { padding: 24px; gap: 14px; }
    .property-meta { grid-template-columns: 1fr 1fr; gap: 10px 14px; }

    .why-head { padding: 16px 20px; }
    .why-inner { padding: 4px 20px 20px; gap: 20px; }
    .why-head .left { gap: 10px; flex-wrap: wrap; }
    .why-head h3 { font-size: 18px; }

    .scan-head { padding: 16px 20px 14px; flex-wrap: wrap; gap: 10px; }
    .scan-head h3 { font-size: 20px; }
    .scan-body { padding: 14px 16px 20px; }
    .platforms { padding: 18px 20px; }

    .scan-step { grid-template-columns: 28px 1fr; gap: 10px; padding: 12px 8px; }
    .scan-step-tag { grid-column: 2; justify-self: start; }

    .section-head { margin: 28px 0 12px; }
    .section-head h2 { font-size: 22px; }
    .ps-head { padding: 14px 16px; gap: 10px; flex-wrap: wrap; }
    .ps-head .right { margin-left: auto; }
    .ps-inner { padding: 0 16px 16px; }
  }

  @media (max-width: 480px) {
    .main { padding: 16px 14px 48px; }
    .topbar { margin-bottom: 20px; }
    .breadcrumb { display: none; }
    .topbar-actions { gap: 6px; justify-content: stretch; }
    .topbar-actions .btn { flex: 0 0 auto; padding: 0 10px; }
    .state-chips { width: 100%; justify-content: space-between; }
    .state-chips button { flex: 1; padding: 6px 8px; font-size: 12px; }
    .replay-btn-action .btn-label,
    .share-btn .btn-label,
    .export-btn .btn-label { display: none; }
    .replay-btn-action,
    .share-btn,
    .export-btn { padding: 0 10px; min-width: 36px; justify-content: center; }

    .page-title { margin-bottom: 4px; }
    .tag-row { gap: 5px; margin-top: 12px; }
    .tag { height: 24px; padding: 0 8px; font-size: 11px; }

    .score-hero { padding: 20px; }
    .score-summary { padding: 20px; }
    .score-summary h3 { font-size: 19px; }
    .property-meta { grid-template-columns: 1fr; gap: 12px; padding-top: 14px; }

    .scan-head { padding: 14px 16px 12px; }
    .scan-body { padding: 12px 12px 18px; }
    .platforms { padding: 14px 16px; }
    .pf-card { padding: 14px; }

    .why-head { padding: 14px 16px; }
    .why-inner { padding: 4px 16px 18px; gap: 16px; }
    .factor { grid-template-columns: 24px 1fr; gap: 10px; padding: 12px 0; }
    .factor .ico { width: 24px; height: 24px; }
    .factor .weight { grid-column: 2; justify-self: start; margin-top: 4px; }

    .timeline { padding-left: 12px; }
    .log-line { grid-template-columns: 1fr auto; gap: 8px; padding: 5px 0 5px 14px; font-size: 11.5px; }
    .log-line .ts { display: none; }

    .listing { grid-template-columns: 44px 1fr; gap: 10px; padding: 10px; }
    .listing .thumb { width: 44px; height: 44px; }
    .listing .match {
      grid-column: 1 / -1;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .listing .title { font-size: 13px; }
    .listing .meta-row { font-size: 10.5px; flex-wrap: wrap; }

    .ps-head { padding: 12px 14px; }
    .ps-head .name { font-size: 14px; }
    .ps-head .count { font-size: 11px; }
    .ps-inner { padding: 0 14px 14px; }

    .section-head h2 { font-size: 20px; }

    .score-risk-row { gap: 8px; }
    .risk-badge { font-size: 12px; padding: 5px 10px 5px 6px; }
    .copy-btn { font-size: 10.5px; padding: 3px 8px; }
  }

  /* tweak panel host overrides */
  .tweaks-panel-launcher { /* ensure visibility */ }

  /* mini button next to score */
  .copy-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
    cursor: pointer;
  }
  .copy-btn:hover { color: var(--brand); border-color: var(--brand); }

</style>
</head>
<body>
<div id="root"></div>

<script type="application/json" id="tweak-defaults">
/*EDITMODE-BEGIN*/{
  "scenario": "medium"
}/*EDITMODE-END*/
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
