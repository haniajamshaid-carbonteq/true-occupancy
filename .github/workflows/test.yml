name: Playwright tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: ${{ github.event_name == 'pull_request' && 'smoke' || 'full' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: pw
        run: |
          v=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: cache-browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright browsers
        if: steps.cache-browsers.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS deps (cached browser)
        if: steps.cache-browsers.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Smoke tests (PRs)
        if: github.event_name == 'pull_request'
        run: npm run test:smoke

      - name: Full test suite (push to main)
        if: github.event_name == 'push'
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
