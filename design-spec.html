<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>True Occupancy — Design Spec</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Serif:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Recoleta&family=General+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Inherit the production design tokens & components */
  :root {
    /* Halcyon Brand 2026 — mirrors src/styles/tokens.css. See docs/DESIGN.md. */
    --bg: #FFFFFF; --surface: #FFFFFF; --surface-2: #F2F2F2;
    --line: #E5E7EB; --line-strong: #CBD5E1;
    --ink: #1C1C1E; --ink-2: #142D55; --ink-3: #475569; --ink-4: #94A3B8;
    --brand: #0AB7A3; --brand-2: #0498C6; --brand-soft: #E6F8F5; --brand-tint: #F2FBFA;
    --brand-deep: #015E7A; --brand-link: #0292BE; --brand-mid: #02AF9B; --brand-footer: #079FAD;
    --navy: #142D55; --navy-quote: #3E6BA4; --navy-mid: #1E4380; --navy-link: #3374DD;
    --clean: #0AB7A3; --clean-soft: #E6F8F5; --clean-ink: #015E7A;
    --warn: #EDA436; --warn-soft: #FDF1DC; --warn-ink: #6B4914; --warn-deep: #C3872D;
    --risk: #C0533C; --risk-soft: #FBE3DB; --risk-ink: #6F2917;
    --airbnb: #FF5A5F; --vrbo: #245ABE; --fb: #1877F2;
    --r-sm: 8px; --r-md: 12px; --r-lg: 18px; --r-xl: 28px;
    --shadow-sm: 0 1px 3px rgba(20,45,85,.055), 0 1px 1px rgba(20,45,85,.035);
    --shadow-md: 0 4px 16px -4px rgba(20,45,85,.09), 0 2px 5px rgba(20,45,85,.05);
    --shadow-lg: 0 24px 48px -16px rgba(20,45,85,.14), 0 8px 16px -8px rgba(20,45,85,.07);
    --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --sans: "Century Gothic", "CenturyGothic", "URW Geometric", "Futura PT",
            "Avenir Next", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --brand-gradient: linear-gradient(90deg, #0AB7A3 0%, #0498C6 100%);
  }
  /* Type pairings — switched via Tweaks panel */
  body[data-type-pairing="institutional"] {
    --serif: "IBM Plex Serif", Georgia, serif;
    --sans: "IBM Plex Sans", system-ui, sans-serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  body[data-type-pairing="editorial-warm"] {
    --serif: "Newsreader", "Iowan Old Style", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  body[data-type-pairing="brand-forward"] {
    --serif: "Recoleta", Georgia, serif;
    --sans: "General Sans", "Inter", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--sans); color: var(--ink); }

  /* === Production component styles (copied from live UI so screens render identically) === */
  .app { min-height: 960px; display: grid; grid-template-columns: 248px 1fr; }
  .sidebar { background: var(--surface-2); border-right: 1px solid var(--line); padding: 28px 22px; display: flex; flex-direction: column; gap: 28px; }
  .logo { display:flex; align-items:center; gap:10px; font-family:var(--serif); font-size:22px; }
  .logo .mark { width:40px; height:40px; flex-shrink:0; }
  .logo .mark img { width:100%; height:100%; object-fit:contain; display:block; }
  .logo em { font-style: italic; color: var(--brand); }
  .logo .product-name { font-size: 18px; line-height:1.1; }
  .logo .product-name .tag { display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.12em; color:var(--ink-3); text-transform:uppercase; margin-top:3px; background:none; border:none; padding:0; height:auto; border-radius:0; }
  .nav { display:flex; flex-direction:column; gap:2px; }
  .nav-section { font-family: var(--mono); font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-4); padding: 12px 10px 6px; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:var(--r-sm); color:var(--ink-2); font-size:14px; font-weight:500; }
  .nav-item.active { background: var(--brand-tint); color: var(--brand); }
  .nav-item .badge { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink-4); }
  .nav-item svg { width:16px; height:16px; opacity:.8; }
  .sidebar-footer { margin-top:auto; padding-top:16px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px; }
  .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#C9B89E,#8C7A5B); color:#fff; display:grid; place-items:center; font-size:12px; font-weight:600; font-family:var(--mono); }
  .avatar-meta .name { font-size:13px; font-weight:500; }
  .avatar-meta .role { font-size:11.5px; color:var(--ink-3); }

  .main { padding: 32px 48px 80px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
  .breadcrumb { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-3); font-family:var(--mono); }
  .breadcrumb .sep { opacity:.4; }
  .breadcrumb .current { color: var(--ink-2); }
  .topbar-actions { display:flex; gap:8px; }

  .btn { display:inline-flex; align-items:center; gap:8px; height:36px; padding:0 14px; border-radius:var(--r-sm); font-size:13px; font-weight:500; border:1px solid var(--line-strong); background:var(--surface); color:var(--ink-2); cursor:pointer; }
  .btn.primary { background:var(--brand); color:#fff; border-color:var(--brand); }
  .btn.ghost { border-color:transparent; background:transparent; }
  .btn svg { width:14px; height:14px; }

  .page-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:24px; gap:24px; }
  .page-title { font-family:var(--serif); font-size:40px; font-weight:400; line-height:1.05; letter-spacing:-.015em; margin:0 0 6px; }
  .page-title em { font-style: italic; color: var(--brand); }
  .page-sub { font-size:14.5px; color:var(--ink-3); max-width:56ch; margin:0; line-height:1.5; }

  .search-wrap { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:8px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-sm); }
  .search-wrap .icon { width:36px; display:grid; place-items:center; color:var(--ink-3); }
  .search-wrap input { flex:1; border:0; outline:0; background:transparent; font-size:16px; padding:8px 0; }
  .search-wrap input::placeholder { color: var(--ink-4); }

  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow-sm); }
  .pill { display:inline-flex; align-items:center; gap:6px; height:24px; padding:0 10px; border-radius:999px; font-family:var(--mono); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.04em; background:var(--surface-2); color:var(--ink-2); border:1px solid var(--line); }
  .pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .pill.clean { background:var(--clean-soft); color:var(--clean-ink); border-color:transparent; }
  .pill.warn  { background:var(--warn-soft);  color:var(--warn-ink);  border-color:transparent; }
  .pill.risk  { background:var(--risk-soft);  color:var(--risk-ink);  border-color:transparent; }
  .pill.brand { background:var(--brand-soft); color:var(--brand); border-color:transparent; }

  .res-2col { display:grid; grid-template-columns:1fr; gap:20px; margin-top:18px; }

  .score-card { display:grid; grid-template-columns:380px 1fr; overflow:hidden; }
  .score-hero { padding:36px; border-right:1px solid var(--line); background:linear-gradient(180deg,var(--surface-2),var(--surface)); }
  .score-hero.r-clean { background:linear-gradient(180deg,var(--clean-soft),var(--surface) 80%); }
  .score-hero.r-warn  { background:linear-gradient(180deg,var(--warn-soft),var(--surface) 80%); }
  .score-hero.r-risk  { background:linear-gradient(180deg,var(--risk-soft),var(--surface) 80%); }
  .score-label { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-3); margin-bottom:12px; }
  .score-num { font-family:var(--serif); font-size:128px; font-weight:400; line-height:.9; letter-spacing:-.04em; display:flex; align-items:baseline; gap:4px; }
  .score-num .denom { font-size:28px; color:var(--ink-4); letter-spacing:-.02em; }
  .score-risk-row { display:flex; align-items:center; gap:10px; margin-top:16px; flex-wrap:wrap; }
  .risk-badge { display:inline-flex; align-items:center; gap:8px; padding:6px 12px 6px 8px; border-radius:999px; font-size:13px; font-weight:500; }
  .risk-badge .glyph { width:22px; height:22px; border-radius:50%; display:grid; place-items:center; color:#fff; }
  .risk-badge.clean { background:var(--clean-soft); color:var(--clean-ink); } .risk-badge.clean .glyph { background:var(--clean); }
  .risk-badge.warn  { background:var(--warn-soft);  color:var(--warn-ink); }  .risk-badge.warn  .glyph { background:var(--warn); }
  .risk-badge.risk  { background:var(--risk-soft);  color:var(--risk-ink); }  .risk-badge.risk  .glyph { background:var(--risk); }

  .score-summary { padding:36px 40px; display:flex; flex-direction:column; gap:18px; }
  .score-summary h3 { font-family:var(--serif); font-size:22px; font-weight:400; margin:0; }
  .score-summary p { margin:0; color:var(--ink-2); font-size:14.5px; line-height:1.55; }
  .property-meta { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; border-top:1px solid var(--line); padding-top:18px; }
  .property-meta .cell .k { font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-4); margin-bottom:4px; }
  .property-meta .cell .v { font-size:13.5px; font-weight:500; }

  .why-card { padding:0; overflow:hidden; }
  .why-head { padding:20px 28px; display:flex; align-items:center; justify-content:space-between; }
  .why-head .left { display:flex; align-items:center; gap:14px; }
  .why-head h3 { font-family:var(--serif); font-size:20px; font-weight:400; margin:0; }
  .why-head .count { font-family:var(--mono); font-size:11.5px; color:var(--ink-3); }
  .chev { width:28px; height:28px; border-radius:50%; background:var(--surface-2); display:grid; place-items:center; color:var(--ink-2); }
  .why-card.open .chev { transform: rotate(180deg); }
  .why-body { display:grid; grid-template-rows:0fr; }
  .why-body > div { overflow:hidden; }
  .why-inner { padding:4px 28px 28px; display:grid; grid-template-columns:1fr 1fr; gap:32px; }
  .factor-col h4 { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ink-3); margin:0 0 14px; display:flex; align-items:center; gap:8px; }
  .factor-col h4 .swatch { width:8px; height:8px; border-radius:2px; }
  .factor-col.neg h4 .swatch { background:var(--risk); } .factor-col.pos h4 .swatch { background:var(--clean); }
  .factor { display:grid; grid-template-columns:28px 1fr auto; gap:12px; padding:14px 0; border-top:1px dashed var(--line); align-items:flex-start; }
  .factor:first-of-type { border-top:0; padding-top:4px; }
  .factor .ico { width:28px; height:28px; border-radius:8px; display:grid; place-items:center; }
  .factor.pos .ico { background:var(--clean-soft); color:var(--clean); }
  .factor.neg .ico { background:var(--risk-soft); color:var(--risk); }
  .factor .body .t { font-size:14px; font-weight:500; line-height:1.35; margin-bottom:3px; }
  .factor .body .d { font-size:13px; color:var(--ink-3); line-height:1.45; }
  .factor .weight { font-family:var(--mono); font-size:11px; padding:2px 8px; border-radius:999px; }
  .factor.pos .weight { color:var(--clean-ink); background:var(--clean-soft); }
  .factor.neg .weight { color:var(--risk-ink); background:var(--risk-soft); }
  .signal-bar { height:6px; background:var(--line); border-radius:999px; margin-top:6px; overflow:hidden; }
  .signal-bar > div { height:100%; border-radius:999px; }
  .factor.pos .signal-bar > div { background:var(--clean); }
  .factor.neg .signal-bar > div { background:var(--risk); }

  /* Resident-mode hero */
  .score-card.resident .resident-hero { padding: 36px 32px 28px; background:linear-gradient(180deg,var(--surface-2),var(--surface)); border-right:1px solid var(--line); }
  .score-card.resident .resident-hero.r-clean { background:linear-gradient(180deg,var(--clean-soft),var(--surface) 80%); }
  .score-card.resident .resident-hero.r-warn  { background:linear-gradient(180deg,var(--warn-soft),var(--surface) 80%); }
  .score-card.resident .resident-hero.r-risk  { background:linear-gradient(180deg,var(--risk-soft),var(--surface) 80%); }
  .resident-hero .r-eyebrow { font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-3); margin-bottom: 14px; }
  .resident-hero .r-verdict { font-family:var(--serif); font-size:88px; line-height:.95; font-weight:400; letter-spacing:-.03em; margin-bottom: 10px; }
  .resident-hero.r-risk  .r-verdict { color: var(--risk); }
  .resident-hero.r-warn  .r-verdict { color: var(--warn); }
  .resident-hero.r-clean .r-verdict { color: var(--brand); }
  .resident-hero .r-sub { font-size:15.5px; color:var(--ink-2); line-height:1.45; max-width: 320px; }
  .resident-hero .r-platforms { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .resident-hero .r-pf-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); }
  .resident-hero .r-pf-list { display:flex; gap:6px; flex-wrap:wrap; }
  .resident-hero .r-pf-chip { font-size:12px; padding: 4px 10px; border-radius:999px; background:var(--surface); border:1px solid var(--line); color:var(--ink-2); font-weight:500; }

  /* Scoring breakdown table */
  .breakdown-table { padding:8px 28px 28px; }
  .bt-head { display:grid; grid-template-columns: 220px 1fr 180px; gap:24px; padding:10px 0 12px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); }
  .bt-head .num { text-align:right; }
  .bt-row { display:grid; grid-template-columns: 220px 1fr 180px; gap:24px; padding:18px 0; border-bottom:1px dashed var(--line); align-items:center; }
  .bt-row:last-child { border-bottom:0; }
  .bt-name { display:flex; align-items:center; gap:10px; font-size:14.5px; font-weight:500; color:var(--ink); }
  .bt-ico { width:26px; height:26px; border-radius:7px; display:grid; place-items:center; flex-shrink:0; }
  .bt-row.neg .bt-ico { background:var(--risk-soft); color:var(--risk); }
  .bt-row.pos .bt-ico { background:var(--clean-soft); color:var(--clean); }
  .bt-row.zero .bt-ico { background:var(--surface-2); color:var(--ink-3); }
  .bt-desc { font-size:13px; color:var(--ink-3); line-height:1.5; }
  .bt-impact { display:flex; align-items:center; gap:12px; justify-content:flex-end; }
  .bt-bar { flex:1; max-width:90px; height:6px; background:var(--line); border-radius:999px; overflow:hidden; }
  .bt-row.neg .bt-bar > div { height:100%; background:var(--risk); border-radius:999px; }
  .bt-row.pos .bt-bar > div { height:100%; background:var(--clean); border-radius:999px; }
  .bt-row.zero .bt-bar > div { height:100%; background:var(--ink-3); opacity:.3; border-radius:999px; }
  .bt-pct { font-family:var(--mono); font-size:13px; font-weight:600; min-width:42px; text-align:right; }
  .bt-row.neg .bt-pct { color:var(--risk); }
  .bt-row.pos .bt-pct { color:var(--clean); }
  .bt-row.zero .bt-pct { color:var(--ink-3); }

  /* Property specs card */
  .prop-specs-card { padding:32px 36px; }
  .prop-specs-head { display:flex; align-items:flex-start; justify-content:space-between; gap:24px; margin-bottom:24px; }
  .prop-specs-title { font-family:var(--serif); font-size:32px; font-weight:600; line-height:1.1; letter-spacing:-.01em; margin:0 0 6px; color:var(--ink); }
  .prop-specs-city { font-size:16px; color:var(--ink-3); }
  .prop-type-pill { display:inline-flex; align-items:center; height:30px; padding:0 14px; border-radius:var(--r-sm); background:var(--surface-2); border:1px solid var(--line); font-family:var(--mono); font-size:11.5px; font-weight:500; color:var(--ink-2); letter-spacing:.04em; flex-shrink:0; }
  .prop-specs-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:32px; padding:20px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line); }
  .prop-specs-cell .k { font-size:14px; color:var(--ink-3); margin-bottom:8px; font-weight:400; }
  .prop-specs-cell .v { font-size:20px; font-weight:600; color:var(--ink); letter-spacing:-.005em; }
  .prop-specs-desc { margin:20px 0 0; font-size:15.5px; color:var(--ink-2); line-height:1.6; }

  /* Property overview = map + specs side-by-side */
  .property-overview { display:grid; grid-template-columns:1.05fr 1fr; gap:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow-sm); overflow:hidden; }
  .property-overview .prop-specs-card { border:0; box-shadow:none; border-radius:0; padding:32px 36px; }

  /* Map card */
  .map-card { position:relative; min-height:480px; border-right:1px solid var(--line); }
  .map-canvas { position:relative; width:100%; height:100%; min-height:480px; overflow:hidden; }
  .map-base { position:absolute; inset:0; background:#F4EFE2; }
  .map-streets { position:absolute; inset:0; width:100%; height:100%; }
  .map-pin { position:absolute; left:35%; top:52%; transform:translate(-50%,-100%); filter:drop-shadow(0 4px 6px rgba(0,0,0,.18)); }
  .map-zoom { position:absolute; top:14px; left:14px; display:flex; flex-direction:column; background:#fff; border:1px solid rgba(0,0,0,.18); border-radius:4px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.18); }
  .map-zoom button { width:30px; height:30px; border:0; background:#fff; font-size:18px; color:#444; cursor:pointer; padding:0; line-height:1; }
  .map-zoom button + button { border-top:1px solid rgba(0,0,0,.18); }
  .map-popup { position:absolute; left:24%; top:30%; background:#fff; border:1px solid rgba(0,0,0,.12); border-radius:6px; padding:12px 16px 14px; box-shadow:0 3px 14px rgba(0,0,0,.15); min-width:200px; }
  .map-popup .popup-close { position:absolute; top:6px; right:10px; color:#999; font-size:14px; cursor:pointer; line-height:1; }
  .map-popup .popup-label { font-weight:600; font-size:14px; color:var(--ink); margin-bottom:4px; }
  .map-popup .popup-addr { font-size:13px; color:var(--ink-2); }
  .map-popup .popup-city { font-size:13px; color:var(--ink-2); margin-bottom:8px; }
  .map-popup .popup-spec { font-size:13px; color:var(--ink-2); }
  .map-popup .popup-tail { position:absolute; bottom:-7px; left:32px; width:12px; height:12px; background:#fff; border-right:1px solid rgba(0,0,0,.12); border-bottom:1px solid rgba(0,0,0,.12); transform:rotate(45deg); }
  .map-attr { position:absolute; bottom:0; right:0; background:rgba(255,255,255,.85); font-size:10px; color:#666; padding:2px 6px; font-family:var(--sans); }

  .scan-card { padding:0; overflow:hidden; }
  .scan-head { padding:20px 28px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); gap:14px; }
  .scan-head h3 { font-family:var(--serif); font-size:22px; font-weight:400; margin:0; }
  .scan-head .meta { display:flex; align-items:center; gap:14px; font-family:var(--mono); font-size:12px; color:var(--ink-3); }
  .scan-head .meta .live-dot { width:8px; height:8px; border-radius:50%; background:var(--clean); }
  .scan-progress { display:flex; align-items:center; gap:8px; margin-top:14px; }
  .scan-progress .bar { flex:1; height:4px; background:var(--line); border-radius:999px; overflow:hidden; }
  .scan-progress .bar-fill { height:100%; background:linear-gradient(90deg,var(--brand),var(--brand-2)); border-radius:999px; }
  .scan-progress .pct { font-family:var(--mono); font-size:12px; color:var(--ink-3); width:40px; text-align:right; }
  .scan-checklist { padding:12px 16px 16px; background:var(--surface-2); display:flex; flex-direction:column; gap:4px; }
  .scan-step { display:grid; grid-template-columns:32px 1fr auto; gap:14px; align-items:center; padding:14px 12px; border-radius:var(--r-md); }
  .scan-step.status-pending { opacity:.5; }
  .scan-step.status-running { background:var(--surface); box-shadow:var(--shadow-sm); }
  .scan-step-icon { width:32px; height:32px; display:grid; place-items:center; }
  .cs-pending { width:14px; height:14px; border-radius:50%; border:1.5px dashed var(--line-strong); }
  .cs-spin { width:16px; height:16px; border-radius:50%; border:1.8px solid var(--brand); border-top-color:transparent; }
  .cs-icon { width:24px; height:24px; border-radius:50%; display:grid; place-items:center; color:#fff; }
  .cs-icon.cs-ok { background:var(--clean); } .cs-icon.cs-warn { background:var(--warn); }
  .scan-step-label { font-size:14.5px; font-weight:500; line-height:1.3; margin-bottom:2px; }
  .scan-step-sub { font-family:var(--mono); font-size:11.5px; color:var(--ink-3); }
  .scan-step.status-running .scan-step-label { color:var(--brand); }

  .section-head { display:flex; align-items:baseline; justify-content:space-between; margin:36px 0 14px; }
  .section-head h2 { font-family:var(--serif); font-size:26px; font-weight:400; margin:0; }
  .section-head .sub { font-family:var(--mono); font-size:11.5px; color:var(--ink-3); text-transform:uppercase; letter-spacing:.06em; }
  .platform-section { border:1px solid var(--line); border-radius:var(--r-lg); background:var(--surface); overflow:hidden; box-shadow:var(--shadow-sm); }
  .platform-section + .platform-section { margin-top:14px; }
  .ps-head { padding:16px 20px; display:flex; align-items:center; gap:14px; }
  .ps-head .name { font-size:15px; font-weight:600; }
  .ps-head .count { font-family:var(--mono); font-size:12px; color:var(--ink-3); }
  .ps-head .right { margin-left:auto; display:flex; align-items:center; gap:12px; }
  .ps-body { display:grid; grid-template-rows:0fr; }
  .ps-body > div { overflow:hidden; }
  .ps-inner { padding:0 20px 20px; display:flex; flex-direction:column; gap:8px; }
  .platform-section.open .chev { transform:rotate(180deg); }
  .empty-state { padding:18px; border:1px dashed var(--line); border-radius:10px; background:var(--surface-2); text-align:center; color:var(--ink-3); font-size:13px; }
  .empty-state strong { color:var(--ink-2); }
  .pf-logo { width:32px; height:32px; border-radius:8px; display:grid; place-items:center; color:#fff; font-weight:700; font-size:14px; flex-shrink:0; }
  .pf-logo.airbnb { background:var(--airbnb); } .pf-logo.vrbo { background:var(--vrbo); } .pf-logo.fb { background:var(--fb); }

  .listing { display:grid; grid-template-columns:56px 1fr auto; gap:12px; padding:12px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line); text-decoration:none; color:inherit; }
  .listing .thumb { width:56px; height:56px; border-radius:8px; }
  .listing .title { font-size:13.5px; font-weight:500; line-height:1.3; margin-bottom:4px; }
  .listing .meta-row { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--ink-3); }
  .listing .meta-row .sep { opacity:.4; }
  .listing .match { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .match-pill { font-family:var(--mono); font-size:10.5px; text-transform:uppercase; padding:2px 8px; border-radius:999px; }
  .match-pill.high { background:var(--risk-soft); color:var(--risk-ink); }
  .match-pill.med  { background:var(--warn-soft); color:var(--warn-ink); }
  .match-pill.low  { background:var(--surface-2); color:var(--ink-3); border:1px solid var(--line); }
  .listing .ext { color:var(--ink-4); font-size:11px; }

  .tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:14px; }
  .tag { display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 10px; background:var(--surface-2); border:1px solid var(--line); border-radius:999px; font-family:var(--mono); font-size:11.5px; color:var(--ink-2); }
  .tag svg { width:12px; height:12px; opacity:.7; }

  /* === Spec-canvas-only chrome === */
  .spec-shell { padding:60px 80px 120px; }
  .spec-header { max-width:900px; margin-bottom:60px; }
  .spec-header .eyebrow { font-family:var(--mono); font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--brand); margin-bottom:14px; }
  .spec-header h1 { font-family:var(--serif); font-size:64px; font-weight:400; line-height:1; letter-spacing:-.02em; margin:0 0 18px; }
  .spec-header h1 em { font-style:italic; color:var(--brand); }
  .spec-header p { font-size:17px; color:var(--ink-2); line-height:1.55; margin:0; max-width:60ch; }
  .spec-meta { display:flex; gap:24px; margin-top:28px; font-family:var(--mono); font-size:12px; color:var(--ink-3); border-top:1px solid var(--line); padding-top:16px; }
  .spec-meta strong { color:var(--ink); font-weight:500; }

  .spec-section { margin-bottom:80px; }
  .spec-section-head { display:flex; align-items:baseline; gap:18px; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--line); }
  .spec-section-head .num { font-family:var(--mono); font-size:13px; color:var(--ink-4); }
  .spec-section-head h2 { font-family:var(--serif); font-size:36px; font-weight:400; letter-spacing:-.01em; margin:0; }
  .spec-section-head .desc { font-size:14px; color:var(--ink-3); margin-left:auto; max-width:42ch; line-height:1.5; }

  /* Frame around each screen mock */
  .screen-wrap { display:flex; flex-direction:column; gap:14px; margin-bottom:56px; }
  .screen-meta { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  .screen-meta .label { font-family:var(--mono); font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--brand); }
  .screen-meta h3 { font-family:var(--serif); font-size:22px; font-weight:400; margin:0; }
  .screen-meta .dim { font-family:var(--mono); font-size:11.5px; color:var(--ink-4); margin-left:auto; }
  .screen-meta .desc { font-size:13.5px; color:var(--ink-3); width:100%; line-height:1.5; max-width:80ch; }

  .screen-frame {
    border:1px solid var(--line-strong);
    border-radius:14px;
    background:var(--bg);
    overflow:hidden;
    box-shadow:0 24px 64px -32px rgba(28,27,23,.18), 0 4px 8px -2px rgba(28,27,23,.04);
    position:relative;
  }
  .screen-frame .browser-bar {
    height:38px;
    background:#EFECE3;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    padding:0 16px;
    gap:8px;
  }
  .browser-bar .dots { display:flex; gap:6px; }
  .browser-bar .dots span { width:11px; height:11px; border-radius:50%; }
  .browser-bar .dots span:nth-child(1) { background:#E6604F; }
  .browser-bar .dots span:nth-child(2) { background:#E5A93A; }
  .browser-bar .dots span:nth-child(3) { background:#5BB35C; }
  .browser-bar .url { flex:1; height:22px; border-radius:6px; background:rgba(255,255,255,.6); border:1px solid var(--line); display:flex; align-items:center; padding:0 10px; font-family:var(--mono); font-size:11px; color:var(--ink-3); margin:0 80px; }

  .screen-canvas { transform-origin: top left; width:1440px; }

  /* Spec details below each screen */
  .spec-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:18px;
    margin-top:8px;
  }
  .spec-card {
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--r-md);
    padding:18px 20px;
  }
  .spec-card h4 {
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--ink-4);
    margin:0 0 10px;
  }
  .spec-card ul { margin:0; padding:0; list-style:none; display:flex; flex-direction:column; gap:8px; }
  .spec-card li { font-size:13px; color:var(--ink-2); line-height:1.5; display:grid; grid-template-columns:140px 1fr; gap:14px; }
  .spec-card li .k { font-family:var(--mono); color:var(--ink-3); font-size:11.5px; }
  .spec-card li .v { color:var(--ink); }
  .spec-card li .v code { font-family:var(--mono); font-size:11.5px; background:var(--surface-2); padding:1px 6px; border-radius:4px; border:1px solid var(--line); }

  /* Token cards */
  .token-row { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; }
  .token { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:14px; }
  .token .swatch { height:64px; border-radius:8px; border:1px solid var(--line); margin-bottom:10px; }
  .token .name { font-size:13px; font-weight:500; }
  .token .var { font-family:var(--mono); font-size:11px; color:var(--ink-3); margin-top:2px; }
  .token .hex { font-family:var(--mono); font-size:11px; color:var(--ink-4); margin-top:2px; }

  .type-row { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  .type-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:24px; }
  .type-card .meta { font-family:var(--mono); font-size:11.5px; color:var(--ink-3); margin-bottom:14px; display:flex; gap:16px; flex-wrap:wrap; }
  .type-card .meta b { color:var(--ink); font-weight:500; }
  .type-card .preview { color:var(--ink); }

  .spacing-row { display:flex; flex-wrap:wrap; gap:24px; align-items:flex-end; }
  .spacing-item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .spacing-block { background:var(--brand-soft); border:1px solid var(--brand-tint); border-radius:4px; }
  .spacing-item .lbl { font-family:var(--mono); font-size:11px; color:var(--ink-3); }

  .radius-row { display:flex; gap:18px; flex-wrap:wrap; }
  .radius-item { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .radius-block { width:80px; height:80px; background:var(--brand-soft); border:1px solid var(--brand-tint); }

  /* Component spec strip */
  .comp-strip { display:grid; grid-template-columns:1fr 1fr 1fr; gap:18px; margin-bottom:24px; }
  .comp-card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:24px; }
  .comp-card .preview { padding:24px; background:var(--bg); border-radius:8px; margin-bottom:14px; display:flex; align-items:center; justify-content:center; min-height:96px; flex-wrap:wrap; gap:10px; }
  .comp-card h5 { margin:0 0 6px; font-size:14px; font-weight:600; }
  .comp-card p { margin:0; font-size:12.5px; color:var(--ink-3); line-height:1.5; }
  .comp-card .specs { margin-top:10px; font-family:var(--mono); font-size:11px; color:var(--ink-3); display:flex; flex-direction:column; gap:3px; }

  /* Annotation callouts (Figma-style red pins) */
  .annot {
    position:absolute;
    background:#fff;
    border:1.5px solid var(--risk);
    color:var(--risk-ink);
    font-family:var(--mono);
    font-size:11px;
    font-weight:500;
    padding:4px 8px;
    border-radius:6px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    white-space:nowrap;
    z-index:5;
  }
  .annot::before {
    content:'';
    position:absolute;
    width:8px; height:8px;
    background:var(--risk);
    border-radius:50%;
    top:50%; transform:translateY(-50%);
    left:-12px;
  }

  /* Print-friendly: contain horizontal scroll */
  body { overflow-x:auto; min-width:1500px; }

  .nav-anchor { position:sticky; top:0; z-index:50; background:rgba(247,245,240,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:14px 80px; display:flex; gap:18px; font-family:var(--mono); font-size:12px; }
  .nav-anchor a { color:var(--ink-3); text-decoration:none; padding:4px 10px; border-radius:6px; }
  .nav-anchor a:hover { color:var(--brand); background:var(--brand-soft); }
  .nav-anchor .brand { font-family:var(--serif); font-size:16px; font-style:italic; color:var(--brand); margin-right:auto; }
</style>
</head>
