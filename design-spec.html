<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>True Occupancy — Design Spec</title>

<!-- Heavy font set kept here on purpose: design-spec.html is where the
     type-pairing toggle lives, so all fallback families need to be loadable. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Serif:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Hanken+Grotesk:wght@200;300;400;500;600;700;800&family=Archivo+Narrow:wght@400;500;600;700&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=recoleta@400,500,600,700&f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">

<!-- Production design tokens & type pairings — same source files as app.html
     so the spec can never drift from the live UI's design system. -->
<link rel="stylesheet" href="src/styles/tokens.css">
<link rel="stylesheet" href="src/styles/typography.css">
<link rel="stylesheet" href="src/styles/print.css">

<!-- Tailwind Play CDN — config mirrors app.html so utilities resolve identically -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Tailwind config — single shared source, see src/styles/tailwind-config.js -->
<script src="src/styles/tailwind-config.js"></script>

<style>
  /* === Spec-canvas chrome only — production component styles come from
        tokens.css + Tailwind utilities resolved against the live src/ tree. */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #FAFAF7; color: var(--ink); font-family: var(--sans); }
  #boot-status { position: fixed; left: 16px; bottom: 16px; font: 12px/1.4 ui-monospace, monospace; color: var(--ink-3); background: var(--surface); border: 1px solid var(--line); padding: 6px 10px; border-radius: 6px; box-shadow: var(--shadow-sm); z-index: 9999; }
  #boot-status.error { color: var(--error-ink); background: var(--error-soft); border-color: transparent; }

  .spec-canvas { padding: 80px 64px 120px; max-width: 1640px; margin: 0 auto; }

  .spec-header { max-width: 900px; margin-bottom: 60px; }
  .spec-header .eyebrow { font-family: var(--mono); font-size: var(--text-caption); text-transform: uppercase; letter-spacing: .1em; color: var(--brand); margin-bottom: 14px; }
  .spec-header h1 { font-family: var(--serif); font-size: var(--text-display); font-weight: 600; line-height: 1; letter-spacing: -.02em; margin: 0 0 18px; }
  .spec-header h1 em { font-style: italic; color: var(--brand); }
  .spec-header p { font-size: var(--text-h4); color: var(--ink-2); line-height: 1.55; margin: 0; max-width: 60ch; }
  .spec-header code { font-family: var(--mono); font-size: var(--text-body-sm); background: var(--brand-soft); color: var(--brand-deep); padding: 1px 6px; border-radius: 4px; }

  .spec-section { margin-bottom: 80px; }
  .spec-section-head { display: flex; align-items: baseline; gap: 18px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--line); }
  .spec-section-head .num { font-family: var(--mono); font-size: var(--text-label); color: var(--ink-4); }
  .spec-section-head h2 { font-family: var(--serif); font-size: var(--text-h2); font-weight: 600; letter-spacing: -.01em; margin: 0; }
  .spec-section-head .desc { font-size: var(--text-body-sm); color: var(--ink-3); margin-left: auto; max-width: 42ch; line-height: 1.5; }
  .spec-row { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }

  .screen-wrap { display: flex; flex-direction: column; gap: 14px; }
  .screen-meta { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .screen-meta .label { font-family: var(--mono); font-size: var(--text-micro); text-transform: uppercase; letter-spacing: .08em; color: var(--brand); }
  .screen-meta h3 { font-family: var(--serif); font-size: var(--text-h3); font-weight: 600; margin: 0; }
  .screen-meta .dim { font-family: var(--mono); font-size: var(--text-micro); color: var(--ink-4); margin-left: auto; }
  .screen-meta .desc { font-size: var(--text-label); color: var(--ink-3); width: 100%; line-height: 1.5; max-width: 80ch; }

  .screen-frame {
    border: 1px solid var(--line-strong);
    border-radius: 14px;
    background: var(--bg);
    overflow: hidden;
    box-shadow: 0 24px 64px -32px rgba(28, 27, 23, .18), 0 4px 8px -2px rgba(28, 27, 23, .04);
  }
  .screen-frame .browser-bar {
    height: 38px;
    background: #EFECE3;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
  }
  .browser-bar .dots { display: flex; gap: 6px; }
  .browser-bar .dots span { width: 11px; height: 11px; border-radius: 50%; }
  .browser-bar .dots span:nth-child(1) { background: #E6604F; }
  .browser-bar .dots span:nth-child(2) { background: #E5A93A; }
  .browser-bar .dots span:nth-child(3) { background: #5BB35C; }
  .browser-bar .url { flex: 1; height: 22px; border-radius: 6px; background: rgba(255, 255, 255, .6); border: 1px solid var(--line); display: flex; align-items: center; padding: 0 10px; font-family: var(--mono); font-size: var(--text-micro); color: var(--ink-3); margin: 0 80px; }

  .screen-canvas { transform-origin: top left; }

  .nav-anchor {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(250, 250, 247, .85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 14px 80px;
    margin: -80px -64px 60px;
    display: flex;
    gap: 18px;
    font-family: var(--mono);
    font-size: var(--text-caption);
  }
  .nav-anchor a { color: var(--ink-3); text-decoration: none; padding: 4px 10px; border-radius: 6px; }
  .nav-anchor a:hover { color: var(--brand); background: var(--brand-soft); }
  .nav-anchor .brand { font-family: var(--serif); font-size: var(--text-body); font-style: italic; color: var(--brand); margin-right: auto; }
</style>
</head>

<body data-type-pairing="halcyon">

<div id="root"></div>
<div id="boot-status">Loading…</div>

<!-- React 18 + React Router v5 (UMD) + Babel Standalone -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/react-router@5.3.4/umd/react-router.min.js" crossorigin></script>
<script src="https://unpkg.com/react-router-dom@5.3.4/umd/react-router-dom.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script>
/*
 * Bootstrap: same fetch+compile+inject pipeline as app.html. Mounts the
 * exact same /src TSX tree, then renders <SpecApp /> (instead of <App />)
 * to lay every page out on the canvas.
 *
 * Adding a new page to /src/pages: import it in src/spec/SpecApp.tsx
 * (and add to the global declaration), then add a <Screen> for it.
 */
(async () => {
  const status = document.getElementById('boot-status');
  const files = [
    // 1. Domain
    'src/data/scenarios.tsx',
    'src/data/aiInvestigation.tsx',
    // 1b. State (provides useAppState consumed by AppShell + notification dock)
    'src/state/AppState.tsx',
    // 2. Primitives
    'src/components/ui/Icons.tsx',
    'src/components/ui/Button.tsx',
    'src/components/ui/Pill.tsx',
    'src/components/ui/Card.tsx',
    'src/components/ui/Modal.tsx',
    'src/components/ui/Drawer.tsx',
    'src/components/ui/ChipRow.tsx',
    'src/components/ui/DateRangePicker.tsx',
    'src/components/ui/Tabs.tsx',
    'src/components/ui/Input.tsx',
    'src/components/ui/Checkbox.tsx',
    'src/components/ui/RiskBadge.tsx',
    'src/components/ui/SearchBar.tsx',
    'src/components/ui/CommandSearch.tsx',
    'src/components/ui/CommandPalette.tsx',
    'src/components/ui/Avatar.tsx',
    'src/components/ui/Keycap.tsx',
    'src/components/ui/TableSkeleton.tsx',
    'src/components/ui/DataTable.tsx',
    'src/components/ui/ScreenEmpty.tsx',
    'src/components/ui/ScreenError.tsx',
    'src/components/ui/MetricCard.tsx',
    'src/components/ui/DropdownMenu.tsx',
    'src/components/ui/BatchHugCard.tsx',
    // 2b. Notification Dock
    'src/components/notification/NotificationRow.tsx',
    'src/components/notification/NotificationStack.tsx',
    'src/components/notification/NotificationPill.tsx',
    'src/components/notification/NotificationDock.tsx',
    // 3. Structural
    'src/components/SideNav.tsx',
    'src/components/AppShell.tsx',
    'src/components/PageHeader.tsx',
    'src/components/ScanContextBar.tsx',
    'src/components/AutomateModal.tsx',
    'src/components/AutomationControl.tsx',
    'src/components/VerdictTiles.tsx',
    // 4. Scan
    'src/components/scan/ScanCard.tsx',
    'src/components/scan/ScanStage.tsx',
    // 5. Result
    'src/components/result/ConfidenceHero.tsx',
    'src/components/result/PropertyMap.tsx',
    'src/components/result/PropertySpecs.tsx',
    'src/components/result/PropertyOverview.tsx',
    'src/components/result/ListingsPanel.tsx',
    'src/components/result/CertificateSheet.tsx',
    'src/components/result/AIInvestigator.tsx',
    // 6. Pages (real production screens — no Static* clones)
    'src/pages/Components.tsx',
    'src/pages/HomeScreen.tsx',
    'src/pages/HistoryScreen.tsx',
    'src/pages/BatchScreen.tsx',
    'src/pages/ScanStartScreen.tsx',
    'src/pages/ScanMidScreen.tsx',
    'src/pages/ResultCleanScreen.tsx',
    'src/pages/ResultMediumScreen.tsx',
    'src/pages/ResultHighScreen.tsx',
    'src/pages/WhyExpandedScreen.tsx',
    // 7. Spec canvas (only files unique to this surface)
    'src/spec/SpecCanvas.tsx',
    'src/spec/SpecApp.tsx',
  ];

  const compileOpts = {
    presets: [
      ['typescript', { isTSX: true, allExtensions: true, allowDeclareFields: true, onlyRemoveTypeImports: true }],
      ['react', { runtime: 'classic' }],
    ],
  };

  function inject(code, filename) {
    const s = document.createElement('script');
    s.textContent = code + `\n//# sourceURL=${filename}`;
    document.head.appendChild(s);
  }

  const cacheBust =
    typeof window.__CACHE_BUST === 'string' ? window.__CACHE_BUST : `?v=${Date.now()}`;

  try {
    for (const path of files) {
      status.textContent = `Compiling ${path}…`;
      const src = await fetch(path + cacheBust).then((r) => {
        if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${path}`);
        return r.text();
      });
      const { code } = Babel.transform(src, { ...compileOpts, filename: path });
      inject(code, path);
    }
    status.textContent = 'Mounting…';
    // Production screens (HomeScreen, HistoryScreen, ...) consume the
    // AppState context. The spec canvas isn't itself an app, so wrap the
    // whole tree in AppStateProvider with its default values — gives the
    // hooks something real to read without coupling the canvas to a
    // specific story.
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(AppStateProvider, null, React.createElement(SpecApp))
    );
    status.remove();
  } catch (err) {
    status.className = 'error';
    status.textContent = 'Boot error — see console';
    console.error('[design-spec.html] boot failed:', err);
  }
})();
</script>

</body>
</html>
